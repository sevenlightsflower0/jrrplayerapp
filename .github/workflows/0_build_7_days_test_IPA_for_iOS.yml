name: 0_build_7_days_test_IPA_for_iOS

on:
  workflow_dispatch:  # Manual trigger

jobs:
  build-ios:
    name: 🎉 iOS Build (7-days free testing)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          architecture: x64

      - run: flutter clean
      - run: flutter pub get

      # 🔧 NEW: Insert DEVELOPMENT_TEAM settings into the existing post_install block
      - name: Patch Podfile with signing overrides
        run: |
          python3 << 'PYTHON'
          import re
          podfile = 'ios/Podfile'
          with open(podfile, 'r') as f:
              content = f.read()
          
          # If already patched, skip
          if 'DEVELOPMENT_TEAM' in content and 'DUMMYTEAM' in content:
              print('Podfile already patched, skipping')
              exit(0)
          
          # Insert our lines after the flutter_additional_ios_build_settings line
          # This is inside the post_install block.
          pattern = r'(flutter_additional_ios_build_settings\(target\)\s*)'
          replacement = r'''\1
              
              # Force-set DEVELOPMENT_TEAM for all Pod targets
              target.build_configurations.each do |config|
                config.build_settings['DEVELOPMENT_TEAM'] = 'DUMMYTEAM'
                config.build_settings['CODE_SIGNING_ALLOWED'] = 'NO'
              end'''
          
          new_content = re.sub(pattern, replacement, content, count=1)
          with open(podfile, 'w') as f:
              f.write(new_content)
          print('Podfile patched successfully')
          PYTHON

      # Update CocoaPods repo (with retry)
      - name: Update CocoaPods repository with retry
        working-directory: ios
        run: |
          for i in {1..3}; do
            echo "Attempt $i: Updating CocoaPods repository..."
            pod repo update && break
            sleep 5
          done

      # Pod install (with retry) – now uses the patched Podfile
      - name: Install CocoaPods dependencies with retry
        working-directory: ios
        run: |
          for i in {1..5}; do
            echo "Attempt $i: Running pod install..."
            pod install --repo-update && break
            echo "Retry in 10s..."
            sleep 10
          done

      # Set dummy team in the main project (extra safety)
      - name: Set dummy Development Team in Xcode project
        run: |
          PROJECT_FILE="ios/Runner.xcodeproj/project.pbxproj"
          sed -i '' 's/DEVELOPMENT_TEAM = .*/DEVELOPMENT_TEAM = DUMMYTEAM;/g' "$PROJECT_FILE"
          sed -i '' 's/CODE_SIGN_IDENTITY = .*/CODE_SIGN_IDENTITY = "";/g' "$PROJECT_FILE"

      # Build – now signing is bypassed for both Runner and Pods
      - name: Build iOS (unsigned)
        env:
          CODE_SIGNING_ALLOWED: "NO"
          CODE_SIGN_IDENTITY: ""
        run: flutter build ios --release --no-codesign

      - name: Create Payload and IPA
        working-directory: build/ios/iphoneos
        run: |
          mkdir Payload
          mv Runner.app Payload/
          zip -qq -r -9 ../FlutterIpaExport.ipa Payload/
          echo "Checking if IPA file was created..."
          ls -la ../FlutterIpaExport.ipa || echo "IPA file not found!"

      - name: Check IPA size
        run: |
          if [ -f "build/ios/FlutterIpaExport.ipa" ]; then
            SIZE=$(stat -f%z "build/ios/FlutterIpaExport.ipa")
            echo "IPA file size: $((SIZE / 1024 / 1024)) MB"
          else
            echo "ERROR: IPA file not found!"
            exit 1
          fi

      - name: Update outdated packages (optional)
        run: |
          flutter pub outdated
          # To automatically upgrade, uncomment:
          # flutter pub upgrade --major-versions

      - name: Upload IPA as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: FlutterIpaExport.ipa
          path: build/ios/FlutterIpaExport.ipa
          retention-days: 7
